apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-app-test
spec:
  ingressClassName: traefik
  rules:
  - host: andytropmimi.fr
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: service-app-test
            port:
              number: 80

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
spec:
  ingressClassName: traefik
  rules:
  - host: argocd.andytropmimi.fr
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              name: https